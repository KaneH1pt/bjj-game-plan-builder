name: Review Agent

on:
  workflow_run:
    workflows: ["Test Agent"]
    types: [completed]

jobs:
  review-agent:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Review Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --state open --json number --jq '.[0].number')
          ISSUE_BODY=$(gh pr view ${PR_NUMBER} --json body --jq '.body')
          claude -p \
            "You are a review agent for the BJJ Game Graph application.

            Step 1 — Read the specification file BJJ_Game_Tree_Specification.html in full.

            Step 2 — Read the code changes in pull request #${PR_NUMBER}. The PR description is:
            ${ISSUE_BODY}

            Step 3 — Identify the scope. Review only the scenarios and requirements explicitly in scope for this PR. Also review any security requirements directly relevant to the implemented feature — these always apply. Do not review scenarios from other ACs that were not requested.

            Step 4 — Produce a plain English compliance report and post it as a comment on pull request #${PR_NUMBER}.

            Your report must:
            - State the scope at the top — which scenarios and requirements were reviewed
            - State clearly: COMPLIANT or NON-COMPLIANT
            - List each in-scope requirement and whether the implementation matches the spec
            - Reference requirements by their identifier (e.g. AUTH-01, SEC-04)
            - Flag anything in the code that contradicts an in-scope requirement, even if tests passed
            - Flag anything in scope that was not implemented but should have been
            - Note any administrative issues (e.g. committed build artefacts) separately — these do not affect the compliance verdict
            - Be written in plain English

            Rules you must follow:
            - Only review what was explicitly requested plus directly relevant security requirements.
            - Do not fix code.
            - Do not approve or merge the pull request.
            - Do not modify the specification.
            - This report is for the product owner — it does not block the merge.

            Token budget: complete your review within 5,000 output tokens." \
            --model claude-sonnet-4-6 \
            --dangerously-skip-permissions
