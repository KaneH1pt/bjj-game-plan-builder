name: Test Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_run:
    workflows: ["Dev Agent"]
    types: [completed]

jobs:
  test-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.event.workflow_run.head_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Python test dependencies
        run: pip install pytest httpx pytest-asyncio --break-system-packages

      - name: Run Test Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL_TEST: ${{ secrets.SUPABASE_URL_TEST }}
          SUPABASE_ANON_KEY_TEST: ${{ secrets.SUPABASE_ANON_KEY_TEST }}
          CAPTCHA_TEST_KEY: ${{ secrets.CAPTCHA_TEST_KEY }}
          RAILWAY_TEST_URL: ${{ secrets.RAILWAY_TEST_URL }}
        run: |
          PR_NUMBER=$(gh pr list --state open --json number --jq '.[0].number')
          ISSUE_BODY=$(gh pr view ${PR_NUMBER} --json body --jq '.body')
          claude -p \
            "You are a test agent for the BJJ Game Graph application.

            Step 1 — Read the specification file BJJ_Game_Tree_Specification.html to understand the BDD scenarios.

            Step 2 — Read pull request #${PR_NUMBER} to understand what was implemented. The PR description is:
            ${ISSUE_BODY}

            Step 3 — Identify the scope. The scenarios explicitly requested in the PR are the primary test targets.

            Step 4 — Write and run pytest tests. For each in-scope scenario:
            - Write a test that verifies the exact behaviour described in the scenario
            - Also write exploratory tests around the edges of that scenario — empty fields, malformed inputs, boundary conditions, unexpected responses. This is not testing other ACs, it is probing the edges of the one that was built.
            - Each test must reference the scenario ID in its name (e.g. test_AUTH_01_returning_user_logs_in)
            - Make real HTTP requests to the Railway test environment at ${RAILWAY_TEST_URL}
            - Each test must be independent — set up and tear down its own state

            Do not test scenarios from other ACs that were not in scope for this PR.

            Step 5 — Run the tests using pytest.

            Step 6 — Post a comment on pull request #${PR_NUMBER} with:
            - The scope — which scenarios were tested
            - A summary table showing each test, its scenario ID, and PASS or FAIL
            - Full error output for any failing test
            - A clear statement at the top: APPROVED TO MERGE or BLOCKED — do not merge

            Rules you must follow:
            - Do not skip in-scope scenarios silently — if a scenario cannot be tested, flag it explicitly as UNTESTABLE with a reason.
            - Do not fix code. Do not suggest fixes. Report only.
            - If the test environment is unavailable, post a comment stating this explicitly and block the merge.
            - Use RAILWAY_TEST_URL as the backend base URL — never localhost, never the production URL.
            - Reference scenarios by their ID (e.g. AUTH-01, NOD-03) in all output.

            Token budget: complete your test run within 6,000 output tokens." \
            --model claude-haiku-4-5-20251001 \
            --dangerously-skip-permissions

      - name: Block merge on failure
        if: failure()
        run: |
          PR_NUMBER=$(gh pr list --state open --json number --jq '.[0].number')
          gh pr comment ${PR_NUMBER} \
            --body "## Test Agent — BLOCKED

            The test agent encountered an error and could not complete the test run. This pull request is blocked from merging until the test agent runs successfully.

            Check the Actions log for details."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
