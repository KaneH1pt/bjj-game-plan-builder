<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BJJ Game Tree</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0d0f12;
    --surface: #161a20;
    --surface2: #1e242d;
    --border: #2a3140;
    --favourite: #22c55e;
    --favourite-glow: rgba(34, 197, 94, 0.2);
    --evolving: #f59e0b;
    --evolving-glow: rgba(245, 158, 11, 0.2);
    --exploring: #ef4444;
    --exploring-glow: rgba(239, 68, 68, 0.15);
    --text: #e8ecf0;
    --text-muted: #6b7a90;
    --node-fill: #1e2836;
    --node-stroke: #3d4f66;
    --accent: #e8a020;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ─── HEADER ─── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--accent);
  }

  .logo span {
    color: var(--text-muted);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
    margin-left: 12px;
    vertical-align: middle;
  }

  /* ─── FILTERS ─── */
  .filters {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .filter-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .filter-btn {
    padding: 5px 14px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .filter-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .filter-btn.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }

  .divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

  /* ─── LEGEND ─── */
  .legend {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .legend-line {
    width: 24px;
    height: 2px;
    border-radius: 1px;
  }

  /* ─── MAIN LAYOUT ─── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ─── GRAPH AREA ─── */
  #graph-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #graph-container svg {
    width: 100%;
    height: 100%;
  }

  .graph-hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 3px;
    pointer-events: none;
    opacity: 0.8;
  }

  /* ─── NODES ─── */
  .node circle {
    fill: var(--node-fill);
    stroke: var(--node-stroke);
    stroke-width: 1.5px;
    transition: all 0.2s ease;
    cursor: pointer;
  }

  .node circle:hover, .node.selected circle {
    fill: var(--surface2);
    stroke: var(--accent);
    stroke-width: 2px;
    filter: drop-shadow(0 0 8px rgba(232, 160, 32, 0.4));
  }

  .node text {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    fill: var(--text);
    pointer-events: none;
    text-anchor: middle;
  }

  .node .tag-text {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    fill: var(--text-muted);
    text-anchor: middle;
  }

  /* ─── EDGES ─── */
  .link {
    cursor: pointer;
  }

  .link path {
    fill: none;
    stroke-width: 2px;
    opacity: 0.7;
    transition: opacity 0.2s ease, stroke-width 0.2s ease;
  }

  .link:hover path, .link.selected path {
    stroke-width: 3px;
    opacity: 1;
  }

  .link.favourite path { stroke: var(--favourite); }
  .link.evolving path  { stroke: var(--evolving); }
  .link.exploring path { stroke: var(--exploring); }

  .link.favourite:hover path, .link.favourite.selected path {
    filter: drop-shadow(0 0 4px var(--favourite));
  }

  .link.evolving:hover path, .link.evolving.selected path {
    filter: drop-shadow(0 0 4px var(--evolving));
  }

  .link-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    fill: var(--text-muted);
    pointer-events: none;
    cursor: pointer;
  }

  /* ─── SIDE PANEL ─── */
  #panel {
    width: 0;
    background: var(--surface);
    border-left: 1px solid var(--border);
    overflow: hidden;
    transition: width 0.25s ease;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }

  #panel.open {
    width: 340px;
  }

  .panel-inner {
    width: 340px;
    padding: 24px;
    overflow-y: auto;
    height: 100%;
  }

  .panel-type {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 6px;
  }

  .panel-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .status-badge.favourite { background: var(--favourite-glow); color: var(--favourite); border: 1px solid var(--favourite); }
  .status-badge.evolving  { background: var(--evolving-glow);  color: var(--evolving);  border: 1px solid var(--evolving); }
  .status-badge.exploring { background: var(--exploring-glow); color: #ef4444;          border: 1px solid var(--exploring); }

  .tag-badges {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    margin-top: 8px;
  }

  .tag-badge {
    padding: 2px 8px;
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.5px;
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .panel-section {
    margin-bottom: 20px;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .notes-text {
    font-size: 13px;
    color: #9aa8ba;
    line-height: 1.7;
  }

  .video-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    text-decoration: none;
    color: var(--text);
    font-size: 13px;
    margin-bottom: 6px;
    transition: all 0.15s ease;
  }

  .video-link:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .video-icon {
    width: 28px;
    height: 28px;
    background: var(--border);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 12px;
  }

  .video-title {
    font-size: 12px;
    line-height: 1.4;
  }

  .panel-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 28px;
    height: 28px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
  }

  .panel-close:hover { border-color: var(--text); color: var(--text); }

  .from-to {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    flex-wrap: wrap;
  }

  .from-to-node {
    padding: 3px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
  }

  .arrow-icon { color: var(--accent); }

  .empty-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    text-align: center;
    gap: 8px;
  }

  .empty-panel .big-icon { font-size: 32px; opacity: 0.3; }

  /* scrollbar */
  .panel-inner::-webkit-scrollbar { width: 4px; }
  .panel-inner::-webkit-scrollbar-track { background: transparent; }
  .panel-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

  NODE FIELDS:
    id       — unique string, used to link edges
    label    — display name on graph
    notes    — text shown in side panel (can be empty string)

    videos   — array of { title, url }

  EDGE FIELDS:
    id       — unique string
    from     — source node id
    to       — target node id
    label    — short label shown on graph (keep under ~25 chars)
    notes    — longer description in side panel
    status   — "favourite" | "evolving" | "exploring"
    tags     — array, any combo of "gi" and "nogi"

<!-- ═══════════════════════════════════════════ UI ═══════════════════════════════════════════ -->

<header>
  <div class="logo">BJJ Game Tree <span>BLUE BELT</span></div>
  <div class="filters">
    <span class="filter-label">GI</span>
    <button class="filter-btn active" data-gi="all">All</button>
    <button class="filter-btn" data-gi="gi">Gi</button>
    <button class="filter-btn" data-gi="nogi">No-Gi</button>
    <div class="divider"></div>
    <span class="filter-label">STATUS</span>
    <button class="filter-btn active" data-status="all">All</button>
    <button class="filter-btn" data-status="favourite">Favourite</button>
    <button class="filter-btn" data-status="evolving">Evolving</button>
    <button class="filter-btn" data-status="exploring">Exploring</button>
    <div class="divider"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-line" style="background:#22c55e"></div>Favourite</div>
      <div class="legend-item"><div class="legend-line" style="background:#f59e0b"></div>Evolving</div>
      <div class="legend-item"><div class="legend-line" style="background:#ef4444"></div>Exploring</div>
    </div>
  </div>
</header>

<div class="main">
  <div id="graph-container">
    <svg id="graph"></svg>
    <div class="graph-hint">Click any node or path for details · Drag to reposition · Scroll to zoom</div>
  </div>

  <div id="panel">
    <div class="panel-inner" id="panel-inner">
      <div class="empty-panel">
        <div class="big-icon">◎</div>
        <div>Click a position or<br>transition to view details</div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── Load data ───────────────────────────────────────────────────
const RAW = JSON.parse(document.getElementById('data-block').textContent);

// ─── State ───────────────────────────────────────────────────────
let filterGi = 'all';
let filterStatus = 'all';
let selectedId = null;

// ─── D3 setup ────────────────────────────────────────────────────
const svg = d3.select('#graph');
const container = document.getElementById('graph-container');

let width = container.clientWidth;
let height = container.clientHeight;

const g = svg.append('g').attr('class', 'root');

const zoom = d3.zoom()
  .scaleExtent([0.3, 3])
  .on('zoom', e => g.attr('transform', e.transform));

svg.call(zoom);

// Arrow markers
const defs = svg.append('defs');

['favourite', 'evolving', 'exploring', 'favourite-sel', 'evolving-sel', 'exploring-sel'].forEach(id => {
  const color = id.includes('favourite') ? '#22c55e' : id.includes('evolving') ? '#f59e0b' : '#ef4444';
  defs.append('marker')
    .attr('id', `arrow-${id}`)
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 32)
    .attr('refY', 0)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-5L10,0L0,5')
    .attr('fill', color);
});

// ─── Simulation ───────────────────────────────────────────────────
const simulation = d3.forceSimulation()
  .force('link', d3.forceLink().id(d => d.id).distance(180).strength(0.6))
  .force('charge', d3.forceManyBody().strength(-600))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collision', d3.forceCollide().radius(60));

// ─── Render ───────────────────────────────────────────────────────
let linkGroup = g.append('g').attr('class', 'links');
let nodeGroup = g.append('g').attr('class', 'nodes');

// Keep stable node objects between renders so simulation positions persist
let stableNodes = [];
let stableLinks = [];

function getFilteredData() {
  const filteredNodes = RAW.nodes.filter(n => {
    if (filterGi !== 'all' && !n.tags.includes(filterGi)) return false;
    return true;
  });
  const nodeIds = new Set(filteredNodes.map(n => n.id));

  const filteredEdges = RAW.edges.filter(e => {
    if (!nodeIds.has(e.from) || !nodeIds.has(e.to)) return false;
    if (filterGi !== 'all' && !e.tags.includes(filterGi)) return false;
    if (filterStatus !== 'all' && e.status !== filterStatus) return false;
    return true;
  });

  // Reuse existing node objects so simulation keeps their x/y/vx/vy
  const nodeMap = new Map(stableNodes.map(n => [n.id, n]));
  const nodes = filteredNodes.map(n => {
    const existing = nodeMap.get(n.id);
    return existing ? Object.assign(existing, n) : { ...n };
  });

  // Build link objects with source/target as node objects (D3 requirement)
  // Reuse stable link objects too so D3 doesn't reset them
  const linkMap = new Map(stableLinks.map(l => [l.id, l]));
  const links = filteredEdges.map(e => {
    const existing = linkMap.get(e.id);
    const link = existing ? Object.assign(existing, e) : { ...e };
    // D3 forceLink will replace source/target with node objects — set as ids for fresh links
    if (!existing) {
      link.source = e.from;
      link.target = e.to;
    }
    return link;
  });

  stableNodes = nodes;
  stableLinks = links;

  return { nodes, links };
}

function render() {
  const { nodes, links } = getFilteredData();

  // ── Links ──────────────────────────────────────────────────────
  const linkSel = linkGroup.selectAll('.link')
    .data(links, d => d.id);

  linkSel.exit().remove();

  const linkEnter = linkSel.enter().append('g');
  linkEnter.append('path');
  linkEnter.append('text').attr('class', 'link-label');

  const linkMerge = linkEnter.merge(linkSel);

  // Update class + click handler on all (not just enter) so re-renders stay live
  linkMerge
    .attr('class', d => `link ${d.status}${selectedId === d.id ? ' selected' : ''}`)
    .on('click', (event, d) => { event.stopPropagation(); selectEdge(d); });

  linkMerge.select('path')
    .attr('marker-end', d => `url(#arrow-${d.status})`);

  // ── Nodes ──────────────────────────────────────────────────────
  const nodeSel = nodeGroup.selectAll('.node')
    .data(nodes, d => d.id);

  nodeSel.exit().remove();

  const nodeEnter = nodeSel.enter().append('g')
    .call(d3.drag()
      .on('start', dragStart)
      .on('drag', dragged)
      .on('end', dragEnd));

  nodeEnter.append('circle').attr('r', 36);
  nodeEnter.append('text').attr('dy', '-2px');
  nodeEnter.append('text').attr('class', 'tag-text').attr('dy', '14px');

  const nodeMerge = nodeEnter.merge(nodeSel);

  nodeMerge
    .attr('class', d => `node${selectedId === d.id ? ' selected' : ''}`)
    .on('click', (event, d) => { event.stopPropagation(); selectNode(d); });

  nodeMerge.select('text:not(.tag-text)').text(d => d.label);
  nodeMerge.select('.tag-text').text(d => d.tags.join('/'));

  // ── Simulation ─────────────────────────────────────────────────
  simulation.nodes(nodes);
  simulation.force('link').links(links); // same objects as DOM — D3 mutates source/target in place
  simulation.alpha(0.4).restart();

  simulation.on('tick', () => {
    linkMerge.select('path').attr('d', d => {
      const src = d.source, tgt = d.target;
      if (!src || !tgt || src.x == null) return '';
      const sx = src.x, sy = src.y, tx = tgt.x, ty = tgt.y;
      const dx = tx - sx, dy = ty - sy;
      const dr = Math.sqrt(dx * dx + dy * dy) || 1;

      const hasReverse = links.some(l =>
        l.id !== d.id &&
        (l.source.id || l.source) === (tgt.id || tgt) &&
        (l.target.id || l.target) === (src.id || src)
      );
      const cs = hasReverse ? dr * 0.35 : dr * 0.08;
      const mx = (sx + tx) / 2 - dy * cs / dr;
      const my = (sy + ty) / 2 + dx * cs / dr;
      return `M${sx},${sy} Q${mx},${my} ${tx},${ty}`;
    });

    linkMerge.select('text').attr('x', d => {
      const src = d.source, tgt = d.target;
      if (!src || !tgt || src.x == null) return 0;
      const dx = tgt.x - src.x, dy = tgt.y - src.y;
      const dr = Math.sqrt(dx * dx + dy * dy) || 1;
      const hasReverse = links.some(l =>
        l.id !== d.id &&
        (l.source.id || l.source) === (tgt.id || tgt) &&
        (l.target.id || l.target) === (src.id || src)
      );
      const cs = hasReverse ? dr * 0.35 : dr * 0.08;
      return (src.x + tgt.x) / 2 - dy * cs / dr;
    }).attr('y', d => {
      const src = d.source, tgt = d.target;
      if (!src || !tgt || src.x == null) return 0;
      const dx = tgt.x - src.x, dy = tgt.y - src.y;
      const dr = Math.sqrt(dx * dx + dy * dy) || 1;
      const hasReverse = links.some(l =>
        l.id !== d.id &&
        (l.source.id || l.source) === (tgt.id || tgt) &&
        (l.target.id || l.target) === (src.id || src)
      );
      const cs = hasReverse ? dr * 0.35 : dr * 0.08;
      return (src.y + tgt.y) / 2 + dx * cs / dr - 6;
    }).text(d => d.label);

    nodeMerge.attr('transform', d => `translate(${d.x ?? 0},${d.y ?? 0})`);
  });
}

// ─── Drag ─────────────────────────────────────────────────────────
function dragStart(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnd(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ─── Selection / Panel ─────────────────────────────────────────────
function selectNode(d) {
  selectedId = d.id;
  render();

  const panel = document.getElementById('panel');
  const inner = document.getElementById('panel-inner');
  panel.classList.add('open');

  const giLabels = { gi: 'Gi', nogi: 'No-Gi' };
  const tagHtml = d.tags.map(t => `<span class="tag-badge">${giLabels[t] || t}</span>`).join('');
  const videoHtml = d.videos.length
    ? d.videos.map(v => `<a class="video-link" href="${v.url}" target="_blank" rel="noopener">
        <div class="video-icon">▶</div>
        <div class="video-title">${v.title}</div>
      </a>`).join('')
    : '<div class="notes-text" style="opacity:0.5">No links added yet</div>';

  inner.innerHTML = `
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div class="panel-type">Position</div>
    <div class="panel-title">${d.label}</div>
    <div class="tag-badges">${tagHtml}</div>
    ${d.notes ? `
    <div class="panel-section">
      <div class="section-label">Notes</div>
      <div class="notes-text">${d.notes}</div>
    </div>` : ''}
    <div class="panel-section">
      <div class="section-label">Reference Links</div>
      ${videoHtml}
    </div>
  `;
}

function selectEdge(d) {
  selectedId = d.id;
  render();

  const panel = document.getElementById('panel');
  const inner = document.getElementById('panel-inner');
  panel.classList.add('open');

  const statusLabels = { favourite: '★ Favourite', evolving: '↑ Evolving', exploring: '○ Exploring' };
  const giLabels = { gi: 'Gi', nogi: 'No-Gi' };
  const tagHtml = d.tags.map(t => `<span class="tag-badge">${giLabels[t] || t}</span>`).join('');
  const videoHtml = d.videos.length
    ? d.videos.map(v => `<a class="video-link" href="${v.url}" target="_blank" rel="noopener">
        <div class="video-icon">▶</div>
        <div class="video-title">${v.title}</div>
      </a>`).join('')
    : '<div class="notes-text" style="opacity:0.5">No links added yet</div>';

  const fromNode = RAW.nodes.find(n => n.id === d.from);
  const toNode = RAW.nodes.find(n => n.id === d.to);

  inner.innerHTML = `
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div class="panel-type">Transition</div>
    <div class="panel-title">${d.label}</div>
    <div class="from-to">
      <span class="from-to-node">${fromNode?.label || d.from}</span>
      <span class="arrow-icon">→</span>
      <span class="from-to-node">${toNode?.label || d.to}</span>
    </div>
    <div style="margin-bottom:14px">
      <span class="status-badge ${d.status}">${statusLabels[d.status]}</span>
    </div>
    <div class="tag-badges">${tagHtml}</div>
    ${d.notes ? `
    <div class="panel-section">
      <div class="section-label">Notes</div>
      <div class="notes-text">${d.notes}</div>
    </div>` : ''}
    <div class="panel-section">
      <div class="section-label">Reference Links</div>
      ${videoHtml}
    </div>
  `;
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  selectedId = null;
  render();
}

svg.on('click', () => closePanel());

// ─── Filters ──────────────────────────────────────────────────────
document.querySelectorAll('[data-gi]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-gi]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterGi = btn.dataset.gi;
    render();
  });
});

document.querySelectorAll('[data-status]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterStatus = btn.dataset.status;
    render();
  });
});

// ─── Resize ───────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  width = container.clientWidth;
  height = container.clientHeight;
  simulation.force('center', d3.forceCenter(width / 2, height / 2));
  simulation.alpha(0.1).restart();
});

// ─── Init ─────────────────────────────────────────────────────────
render();
</script>
